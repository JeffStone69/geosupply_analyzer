name: CI - GeoSupply Analyzer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas plotly yfinance numpy

      - name: Smoke test - Check if app starts
        run: |
          # Run streamlit in headless mode for 10 seconds to catch import/runtime errors
          timeout 10s streamlit run geosupply_analyzer.py --headless --server.headless true --server.port 8501 || echo "App started successfully (timeout is expected)"

      - name: Upload error log if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: geosupply_errors.log
